name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Pull code and build
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_DIR="/home/ubuntu/automation-hub"

            # Clone repo if it doesn't exist, otherwise pull latest
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "First deploy: cloning repository..."
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
            else
              echo "Updating existing deployment..."
              cd "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"

            # Copy .env.production if it exists in a safe location
            if [ -f "/home/ubuntu/.secrets/automation-hub/.env.production" ]; then
              cp /home/ubuntu/.secrets/automation-hub/.env.production "$DEPLOY_DIR/.env.production"
              echo ".env.production copied from secrets location."
            fi

            # Build images (can take several minutes due to Playwright/Chromium)
            echo "Building Docker images..."
            docker compose -f docker-compose.prod.yml build

      - name: Start containers and migrate
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/automation-hub

            # Start containers with pre-built images
            docker compose -f docker-compose.prod.yml up -d

            # Copy Traefik dynamic config files
            TRAEFIK_DYNAMIC_DIR="/home/ubuntu/.openclaw/workspace/traefik-n8n/traefik/dynamic"
            cp deploy/traefik/automation-hub-backend.yml "$TRAEFIK_DYNAMIC_DIR/"
            cp deploy/traefik/automation-hub-frontend.yml "$TRAEFIK_DYNAMIC_DIR/"
            echo "Traefik config files copied."

            # Restart Traefik to pick up new config
            cd /home/ubuntu/.openclaw/workspace/traefik-n8n
            docker compose restart traefik
            echo "Traefik restarted."

            # Wait for backend to be ready
            echo "Waiting for backend to start..."
            cd /home/ubuntu/automation-hub
            for i in $(seq 1 10); do
              if docker exec automation-hub-backend python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"; then
                echo "Health check passed."
                break
              fi
              echo "Attempt $i/10 failed, retrying in 3s..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Backend did not start in time."
                docker compose -f docker-compose.prod.yml logs backend --tail=20
                exit 1
              fi
            done

            # Run database migrations
            echo "Running database migrations..."
            docker exec automation-hub-backend uv run alembic upgrade head
            echo "Migrations applied successfully."

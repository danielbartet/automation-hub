networks:
  traefik-n8n_traefik_net:
    external: true

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: automation-hub-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env.production
    volumes:
      - ./backend/data:/app/data
    networks:
      - traefik-n8n_traefik_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://api.quantorialabs.com
        NEXTAUTH_URL: https://hub.quantorialabs.com
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    container_name: automation-hub-frontend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      - INTERNAL_API_URL=http://automation-hub-backend:8000
      - NEXTAUTH_URL=https://hub.quantorialabs.com
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    networks:
      - traefik-n8n_traefik_net
    depends_on:
      - backend
